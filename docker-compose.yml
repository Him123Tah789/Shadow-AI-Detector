version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shadow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shadow_password}
      POSTGRES_DB: ${POSTGRES_DB:-shadow_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U shadow_user -d shadow_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-shadow_user}:${POSTGRES_PASSWORD:-shadow_password}@db/${POSTGRES_DB:-shadow_db}
      - SECRET_KEY=${SECRET_KEY:-supersecretkey_change_in_production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - BREACH_CHECKER=${BREACH_CHECKER:-mock}
      - HIBP_API_KEY=${HIBP_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-alerts@shieldops.app}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./backend
    command: python worker.py
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-shadow_user}:${POSTGRES_PASSWORD:-shadow_password}@db/${POSTGRES_DB:-shadow_db}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - BREACH_CHECKER=${BREACH_CHECKER:-mock}
      - HIBP_API_KEY=${HIBP_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-alerts@shieldops.app}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
