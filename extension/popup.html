<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Shadow AI Detector</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 0;
        }

        .header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 600;
        }

        .header .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            flex-shrink: 0;
        }

        .body {
            padding: 16px 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: #1e293b;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 22px;
            font-weight: 700;
            color: #a5b4fc;
        }

        .stat-card .label {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 2px;
        }

        .section-title {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 13px;
            margin-bottom: 8px;
            outline: none;
        }

        input:focus {
            border-color: #6366f1;
        }

        button {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: none;
            background: #6366f1;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }

        button:hover {
            background: #4f46e5;
        }

        .footer {
            padding: 10px 20px;
            font-size: 10px;
            color: #475569;
            text-align: center;
            border-top: 1px solid #1e293b;
        }

        .msg {
            font-size: 12px;
            color: #4ade80;
            text-align: center;
            margin-top: 6px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="dot" id="statusDot"></div>
        <h1>Shadow AI Detector</h1>
    </div>

    <div class="body">
        <div class="stats">
            <div class="stat-card">
                <div class="value" id="policyCount">-</div>
                <div class="label">Policies Loaded</div>
            </div>
            <div class="stat-card">
                <div class="value" id="queueCount">-</div>
                <div class="label">Queued Events</div>
            </div>
        </div>

        <div class="section-title">Configuration</div>
        <input type="text" id="orgToken" placeholder="Organization Token" />
        <input type="text" id="userHash" placeholder="User Hash (auto-generated if empty)" />
        <button id="saveBtn">Save & Sync</button>
        <div class="msg" id="msg">✓ Saved and synced!</div>
    </div>

    <div class="footer">Domain-level monitoring only · No content captured</div>

    <script src="popup.js"></script>
</body>

</html>
